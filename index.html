<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROAS.RYE</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
:root {
  --accent-color: #00f0ff; /* default accent */
}

/* ---------------- BODY & GRID ---------------- */
body {
  margin: 0;
  padding: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  background: 
    repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 20px),
    repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 20px),
    #000814;
  background-size: 20px 20px;
  overflow-x: hidden;
  position: relative;
}

/* ---------------- COLOR PICKER ---------------- */
.color-picker {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 10px 15px;
  border-radius: 12px;
  color: white;
  font-family: sans-serif;
  z-index: 999;
}

.color-picker input[type="color"] {
  width: 50px;
  height: 30px;
  border: none;
  cursor: pointer;
  background: none;
}

/* ---------------- HERO ---------------- */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
  z-index: 2;
}

.hero h1 {
  font-size: 72px;
  margin: 0;
}

.hero p {
  font-size: 20px;
  margin: 10px 0 30px 0;
  max-width: 600px;
}

/* CTA */
.cta {
  background: var(--accent-color);
  color: #fff;
  padding: 18px 32px;
  font-size: 16px;
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.3s;
}

.cta:hover {
  filter: brightness(1.2);
}

/* ---------------- FLOATING ORB ---------------- */
.orb {
  position: absolute;
  width: 100px;
  height: 100px;
  background: var(--accent-color);
  border-radius: 50%;
  top: 20%;
  left: 50%;
  transform: translate(-50%, 0);
  z-index: 1;
  filter: blur(50px);
  opacity: 0.5;
}

/* ---------------- GLASS PANELS ---------------- */
.service-section {
  padding: 80px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  z-index: 2;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 40px;
  width: 100%;
  max-width: 1200px;
  margin-top: 50px;
}

.service {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px;
  padding: 40px;
  transition: all 0.3s;
  color: #fff;
}

.service:hover {
  transform: translateY(-10px);
  backdrop-filter: blur(25px);
}

/* ---------------- BACKGROUND BLOBS ---------------- */
.blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.5;
  mix-blend-mode: screen;
  z-index: 0;
}

.blob1 {
  width: 300px;
  height: 300px;
  background: var(--accent-color);
  top: 20%;
  left: 10%;
}

.blob2 {
  width: 400px;
  height: 400px;
  background: var(--accent-color);
  top: 50%;
  right: 5%;
}

.blob3 {
  width: 250px;
  height: 250px;
  background: var(--accent-color);
  bottom: 10%;
  left: 40%;
}

/* ---------------- FLOATING SQUARES ---------------- */
.cube {
  position: absolute;
  width: 100px;
  height: 100px;
  top: 15%;
  left: 10%;
  background: var(--accent-color);
  border-radius: 12px;
  filter: blur(40px);
  opacity: 0.45;
  z-index: 1;
}

.panel {
  position: absolute;
  width: 150px;
  height: 80px;
  top: 50%;
  right: 10%;
  background: var(--accent-color);
  border-radius: 10px;
  filter: blur(50px);
  opacity: 0.4;
  z-index: 1;
}

/* ---------------- MOBILE OPTIMIZATION ---------------- */
@media (max-width: 768px) {
  .hero h1 { font-size: 48px; }
  .hero p { font-size: 16px; padding: 0 12px; }

  .service-grid { grid-template-columns: 1fr; gap: 25px; }
  .service { padding: 28px; }

  .cta { padding: 14px 26px; font-size: 14px; }

  .orb { width: 60px; height: 60px; }
  .blob { filter: blur(80px); opacity: 0.3; }
  .blob1, .blob2, .blob3 { width: 150px; height: 150px; }
  .cube { width: 80px; height: 80px; top: 10%; left: 10%; }
  .panel { width: 100px; height: 60px; top: 30%; right: 10%; }

  .color-picker { width: auto; bottom: 15px; right: 15px; font-size: 12px; padding: 8px 10px; }
}
</style>
</head>
<body>

<!-- FLOATING SHAPES -->
<div class="orb"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>
<div class="cube"></div>
<div class="panel"></div>

<!-- COLOR PICKER -->
<div class="color-picker">
  <label for="accent">Accent Color:</label>
  <input type="color" id="accent" value="#00f0ff">
</div>

<!-- HERO -->
<section class="hero">
  <h1>ROAS.RYE</h1>
  <p>High-performance paid ads and conversion systems.</p>
  <a href="https://form.typeform.com/to/v52LyFod" class="cta" target="_blank">Start Project</a>
</section>

<!-- SERVICES -->
<section class="service-section">
  <h2>Our Services</h2>
  <div class="service-grid">
    <div class="service">Paid Media</div>
    <div class="service">Landing Page Design</div>
    <div class="service">Conversion Optimization</div>
    <div class="service">Analytics & Reporting</div>
  </div>
</section>

<script>
/* ---------------- SCROLL ORB & SHAPES ---------------- */
const orb = document.querySelector(".orb");
const cube = document.querySelector(".cube");
const panel = document.querySelector(".panel");

window.addEventListener("scroll", () => {
  let scroll = window.scrollY;
  let speed = window.innerWidth <= 768 ? 0.3 : 0.6;

  orb.style.transform = `translate(-50%, ${scroll * speed}px)`;
  cube.style.transform = `translate(0, ${scroll * speed * 0.5}px)`;
  panel.style.transform = `translate(0, ${scroll * speed * 0.7}px)`;
});

/* ---------------- ACCENT COLOR SLIDER ---------------- */
const colorPicker = document.getElementById("accent");
colorPicker.addEventListener("input", (e) => {
  document.documentElement.style.setProperty('--accent-color', e.target.value);
});
</script>

</body>
</html>
